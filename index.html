<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cockpit — PeakWarden</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  color: #fff;
  background: #04040a;
}

/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background-image: url('https://connormuhl.github.io/peakwarden-dashboard/Assets/Peakwarden%20dashboard%20photo.jpg');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(5, 8, 15, 0.18);
}

/* ── APP SHELL ── */
.app {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  padding: 18px 24px 18px;
  gap: 12px;
}

/* ── HEADER ── */
header {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  transition: filter 0.38s ease, opacity 0.38s ease;
}
.globe {
  font-size: 24px; line-height: 1;
  filter: grayscale(1) brightness(0.15) contrast(2);
}
h1 {
  font-family: Georgia, 'Palatino Linotype', 'Times New Roman', serif;
  font-size: 28px; font-weight: 700;
  letter-spacing: 0.04em;
  color: #fff;
  text-shadow: 0 1px 14px rgba(0,0,0,0.7);
}

/* ── GRID — 5 cols × 4 rows, all cells identical ── */
.grid {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 9px;
  transition: filter 0.38s ease, opacity 0.38s ease;
}

/* ── PANEL-OPEN STATE ── */
body.panel-open header {
  filter: blur(5px);
  opacity: 0.35;
  pointer-events: none;
}
body.panel-open .grid {
  filter: blur(6px) brightness(0.6);
  opacity: 0.5;
  pointer-events: none;
}

/* ── CARD ── */
@keyframes card-bounce {
  0%   { transform: scale(1)    translateY(0);      animation-timing-function: ease-out; }
  26%  { transform: scale(1.16) translateY(-16px);  animation-timing-function: ease-in; }
  50%  { transform: scale(1.11) translateY(-5px);   animation-timing-function: ease-out; }
  66%  { transform: scale(1.15) translateY(-13px);  animation-timing-function: ease-in; }
  80%  { transform: scale(1.12) translateY(-7px);   animation-timing-function: ease-out; }
  90%  { transform: scale(1.14) translateY(-10px);  animation-timing-function: ease-in; }
  100% { transform: scale(1.13) translateY(-9px); }
}

.card {
  /* Centered in its grid cell, half the cell size */
  place-self: center;
  width: 55%;
  height: 55%;
  background: rgba(14, 14, 20, 0.42);
  backdrop-filter: blur(14px) saturate(1.3);
  -webkit-backdrop-filter: blur(14px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: 13px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  padding: 8px 6px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.26s ease-in, box-shadow 0.22s ease, border-color 0.22s ease;
}
.card.bouncing {
  animation: card-bounce 0.46s ease forwards;
}
.card:hover {
  box-shadow: 0 18px 44px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.24);
  border-color: rgba(255,255,255,0.28);
  z-index: 2;
}
.card:active {
  transform: translateY(2px);
  transition-duration: 0.07s;
}
.card-emoji {
  font-size: clamp(20px, 2vw, 28px);
  line-height: 1;
}
.card-name {
  font-size: clamp(8.5px, 0.72vw, 11px);
  font-weight: 500;
  text-align: center;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.02em;
  line-height: 1.35;
}

/* ── FLOATING CLONE (during panel transition) ── */
.floating-card {
  position: fixed !important;
  margin: 0 !important;
  z-index: 300;
  cursor: default !important;
  box-shadow: 0 18px 56px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.2) !important;
  border-color: rgba(255,255,255,0.22) !important;
  background: rgba(20, 20, 30, 0.9) !important;
  pointer-events: none;
}
.floating-card:hover { transform: none !important; }

/* ── SIDE PANEL ── */
.panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 360px;
  background: rgba(8, 9, 16, 0.9);
  backdrop-filter: blur(32px) saturate(1.8);
  -webkit-backdrop-filter: blur(32px) saturate(1.8);
  border-left: 1px solid rgba(255,255,255,0.1);
  z-index: 400;
  transform: translateX(100%);
  transition: transform 0.44s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column;
  padding: 26px 22px 22px;
}
.panel.open {
  transform: translateX(0);
  box-shadow: -14px 0 60px rgba(0,0,0,0.6);
}

.panel-header {
  display: flex; align-items: center; gap: 11px;
  flex-shrink: 0; margin-bottom: 18px;
}
.panel-emoji { font-size: 32px; line-height: 1; }
.panel-title {
  font-family: Georgia, serif;
  font-size: 18px; font-weight: 700;
  color: #fff; flex: 1; line-height: 1.25;
}
.panel-close {
  width: 28px; height: 28px; border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.5);
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.16s, color 0.16s, border-color 0.16s;
  flex-shrink: 0;
}
.panel-close:hover {
  background: rgba(255,255,255,0.13);
  color: #fff;
  border-color: rgba(255,255,255,0.22);
}

.panel-divider {
  height: 1px; background: rgba(255,255,255,0.07);
  margin-bottom: 16px; flex-shrink: 0;
}

.panel-links {
  display: flex; flex-direction: column; gap: 5px;
  overflow-y: auto; flex: 1;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.panel-links::-webkit-scrollbar { width: 4px; }
.panel-links::-webkit-scrollbar-track { background: transparent; }
.panel-links::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.panel-link {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  text-decoration: none;
  color: rgba(255,255,255,0.76);
  font-size: 13px; font-weight: 450;
  letter-spacing: 0.01em;
  transition: background 0.15s, color 0.15s, transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.panel-link:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
  transform: translateX(4px);
  border-color: rgba(255,255,255,0.13);
}
.panel-link-icon {
  font-size: 14px; flex-shrink: 0;
  width: 18px; text-align: center;
}

/* ── CLICK OVERLAY (captures outside-panel clicks) ── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  display: none; cursor: default;
}
body.panel-open .overlay { display: block; }
</style>
</head>

// ── DOM refs ──
const grid       = document.getElementById('grid');
const panel      = document.getElementById('panel');
const overlay    = document.getElementById('overlay');
const panelEmoji = document.getElementById('panelEmoji');
const panelTitle = document.getElementById('panelTitle');
const panelLinks = document.getElementById('panelLinks');
const panelClose = document.getElementById('panelClose');

// ── State ──
let activeCard         = null;
let activeFloatingCard = null;
let activeCardRect     = null;
let isAnimating        = false;

// ── Build grid cards ──
CATEGORIES.forEach((cat) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="card-emoji">${cat.emoji}</span>
    <span class="card-name">${cat.name}</span>
  `;
  card.addEventListener('click', () => openPanel(cat, card));
  card.addEventListener('mouseenter', () => {
    card.classList.remove('bouncing');
    void card.offsetWidth; // force reflow to restart animation
    card.classList.add('bouncing');
  });
  card.addEventListener('mouseleave', () => {
    card.classList.remove('bouncing');
  });
  grid.appendChild(card);
});

// ── Center any partial last row ──
(function centerLastRow() {
  const cols = 5;
  const total = CATEGORIES.length;
  const remainder = total % cols;
  if (remainder === 0) return;
  const cards = Array.from(grid.children);
  const lastRow = cards.slice(-remainder);
  // Spread items evenly: for remainder=2 → cols 2 & 4; for 1 → col 3; for 3 → cols 1,3,5; for 4 → cols 1,2,4,5
  const starts = { 1: [3], 2: [2, 4], 3: [1, 3, 5], 4: [1, 2, 4, 5] };
  const cols_ = starts[remainder] || [];
  lastRow.forEach((card, i) => { if (cols_[i]) card.style.gridColumn = String(cols_[i]); });
})();

// ── Open panel ──
function openPanel(cat, cardEl) {
  if (activeCard || isAnimating) return;
  isAnimating = true;

  const rect = cardEl.getBoundingClientRect();
  activeCardRect = rect;
  activeCard = cardEl;

  // Create floating clone at exact card position
  const clone = document.createElement('div');
  clone.className = 'card floating-card';
  clone.innerHTML = cardEl.innerHTML;
  Object.assign(clone.style, {
    width:      rect.width  + 'px',
    height:     rect.height + 'px',
    top:        rect.top    + 'px',
    left:       rect.left   + 'px',
    transition: 'none',
  });
  document.body.appendChild(clone);
  activeFloatingCard = clone;

  // Fade out original (keep layout space)
  cardEl.style.opacity         = '0';
  cardEl.style.pointerEvents   = 'none';

  // Blur everything behind
  document.body.classList.add('panel-open');

  // Populate panel content
  panelEmoji.textContent = cat.emoji;
  panelTitle.textContent = cat.name;
  panelLinks.innerHTML = cat.links.map(link =>
    `<a class="panel-link" href="${link.url}" target="_blank" rel="noopener noreferrer">
       <span class="panel-link-icon">${link.icon}</span>
       <span>${link.label}</span>
     </a>`
  ).join('');

  // Animate clone to left-center (two rAFs to force layout)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      clone.style.transition = [
        'top  0.46s cubic-bezier(0.32, 0.72, 0, 1)',
        'left 0.46s cubic-bezier(0.32, 0.72, 0, 1)',
      ].join(', ');
      clone.style.top  = ((window.innerHeight - rect.height) / 2) + 'px';
      clone.style.left = '36px';
    });
  });

  // Slide panel in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      panel.classList.add('open');
    });
  });

  setTimeout(() => { isAnimating = false; }, 480);
}

// ── Close panel ──
function closePanel() {
  if (!activeCard || isAnimating) return;
  isAnimating = true;

  const card  = activeCard;
  const clone = activeFloatingCard;
  const rect  = activeCardRect;

  // Fly clone back to origin
  clone.style.transition = [
    'top  0.42s cubic-bezier(0.32, 0.72, 0, 1)',
    'left 0.42s cubic-bezier(0.32, 0.72, 0, 1)',
  ].join(', ');
  clone.style.top  = rect.top  + 'px';
  clone.style.left = rect.left + 'px';

  panel.classList.remove('open');
  document.body.classList.remove('panel-open');

  setTimeout(() => {
    clone.remove();
    card.style.opacity       = '';
    card.style.pointerEvents = '';
    activeCard         = null;
    activeFloatingCard = null;
    activeCardRect     = null;
    isAnimating        = false;
  }, 440);
}

// ── Event listeners ──
overlay.addEventListener('click', closePanel);
panelClose.addEventListener('click', closePanel);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});
